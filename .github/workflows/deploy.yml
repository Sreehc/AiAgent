name: deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      APP_RUNTIME_ENV: ${{ secrets.APP_RUNTIME_ENV }}
      DEPLOY_APP_DOMAIN: ${{ vars.DEPLOY_APP_DOMAIN }}
      DEPLOY_APP_NAME: ${{ vars.DEPLOY_APP_NAME }}
      DEPLOY_APP_PORT: ${{ vars.DEPLOY_APP_PORT }}
      DEPLOY_BASE_PATH: ${{ vars.DEPLOY_BASE_PATH }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_MODE: ${{ vars.DEPLOY_MODE }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_SERVER_NAMES: ${{ vars.DEPLOY_SERVER_NAMES }}
      DEPLOY_SHARED_RUNTIME_HTTP_PORT: ${{ vars.DEPLOY_SHARED_RUNTIME_HTTP_PORT }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      NGINX_CONFIG_DIR: ${{ vars.NGINX_CONFIG_DIR }}
      SHARED_RUNTIME_BACKEND_PORT_END: ${{ vars.SHARED_RUNTIME_BACKEND_PORT_END }}
      SHARED_RUNTIME_BACKEND_PORT_START: ${{ vars.SHARED_RUNTIME_BACKEND_PORT_START }}
      SHARED_RUNTIME_CONTAINER: ${{ vars.SHARED_RUNTIME_CONTAINER }}
      SHARED_RUNTIME_IMAGE: ${{ vars.SHARED_RUNTIME_IMAGE }}
      SHARED_RUNTIME_REBUILD: ${{ vars.SHARED_RUNTIME_REBUILD }}
      SHARED_RUNTIME_ROOT: ${{ vars.SHARED_RUNTIME_ROOT }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Validate deploy inputs
        run: |
          set -euo pipefail
          test -n "${APP_RUNTIME_ENV}" || { echo "Missing APP_RUNTIME_ENV secret"; exit 1; }
          test -n "${DEPLOY_HOST}" || { echo "Missing DEPLOY_HOST secret"; exit 1; }
          test -n "${DEPLOY_USER}" || { echo "Missing DEPLOY_USER secret"; exit 1; }
          test -n "${DEPLOY_SSH_PRIVATE_KEY}" || { echo "Missing DEPLOY_SSH_PRIVATE_KEY secret"; exit 1; }

      - name: Build frontend
        working-directory: frontend
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm build

      - name: Test backend
        working-directory: backend
        run: |
          set -euo pipefail
          mvn -B test

      - name: Package backend
        working-directory: backend
        run: |
          set -euo pipefail
          mvn -B -DskipTests package

      - name: Assemble release bundle
        run: |
          set -euo pipefail

          app_name="${DEPLOY_APP_NAME:-aiagent}"
          app_port="${DEPLOY_APP_PORT:-18080}"
          deploy_mode="${DEPLOY_MODE:-auto}"
          deploy_base_path="${DEPLOY_BASE_PATH:-/srv/deploy}"
          server_names="${DEPLOY_SERVER_NAMES:-${DEPLOY_APP_DOMAIN:-_}}"
          shared_runtime_http_port="${DEPLOY_SHARED_RUNTIME_HTTP_PORT:-80}"
          shared_runtime_root="${SHARED_RUNTIME_ROOT:-/srv/shared-web-runtime}"
          shared_runtime_image="${SHARED_RUNTIME_IMAGE:-shared-web-runtime:latest}"
          shared_runtime_container="${SHARED_RUNTIME_CONTAINER:-shared-web-runtime}"
          shared_runtime_rebuild="${SHARED_RUNTIME_REBUILD:-false}"
          shared_runtime_backend_port_start="${SHARED_RUNTIME_BACKEND_PORT_START:-18080}"
          shared_runtime_backend_port_end="${SHARED_RUNTIME_BACKEND_PORT_END:-18120}"
          nginx_config_dir="${NGINX_CONFIG_DIR:-}"

          rm -rf release deploy-release.tgz
          mkdir -p release/backend release/frontend release/.deploy

          cp -R infra release/infra
          cp README.md release/README.md
          cp frontend/package.json release/frontend/package.json
          cp -R frontend/dist release/frontend/dist
          cp backend/target/aiagent-backend-*.jar release/backend/app.jar

          printf '%s\n' "${APP_RUNTIME_ENV}" > release/.deploy/app.env
          cat > release/.deploy/deploy.conf <<EOF
          APP_NAME=${app_name}
          APP_DOMAIN=${DEPLOY_APP_DOMAIN:-_}
          APP_SERVER_NAMES=${server_names}
          APP_BACKEND_PORT=${app_port}
          DEPLOY_MODE=${deploy_mode}
          DEPLOY_BASE_PATH=${deploy_base_path}
          SHARED_RUNTIME_HTTP_PORT=${shared_runtime_http_port}
          SHARED_RUNTIME_ROOT=${shared_runtime_root}
          SHARED_RUNTIME_IMAGE=${shared_runtime_image}
          SHARED_RUNTIME_CONTAINER=${shared_runtime_container}
          SHARED_RUNTIME_REBUILD=${shared_runtime_rebuild}
          SHARED_RUNTIME_BACKEND_PORT_START=${shared_runtime_backend_port_start}
          SHARED_RUNTIME_BACKEND_PORT_END=${shared_runtime_backend_port_end}
          NGINX_CONFIG_DIR=${nginx_config_dir}
          RELEASE_SHA=${GITHUB_SHA}
          EOF

          printf '%s\n' "${GITHUB_SHA}" > release/REVISION
          tar -C release -czf deploy-release.tgz .

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/deploy_key"
          chmod 600 "${HOME}/.ssh/deploy_key"
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "${DEPLOY_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Upload release bundle
        run: |
          set -euo pipefail

          app_name="${DEPLOY_APP_NAME:-aiagent}"
          remote_app_root="${DEPLOY_BASE_PATH:-/srv/deploy}/${app_name}"
          remote_release_dir="${remote_app_root}/releases/${GITHUB_SHA}"

          ssh -i "${HOME}/.ssh/deploy_key" -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${remote_release_dir}'"

          scp -i "${HOME}/.ssh/deploy_key" -P "${DEPLOY_PORT:-22}" deploy-release.tgz \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${remote_release_dir}/deploy-release.tgz"

      - name: Deploy on remote host
        run: |
          set -euo pipefail

          app_name="${DEPLOY_APP_NAME:-aiagent}"
          remote_app_root="${DEPLOY_BASE_PATH:-/srv/deploy}/${app_name}"
          remote_release_dir="${remote_app_root}/releases/${GITHUB_SHA}"

          ssh -i "${HOME}/.ssh/deploy_key" -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" <<EOF
          set -euo pipefail
          cd "${remote_release_dir}"
          tar -xzf deploy-release.tgz
          rm -f deploy-release.tgz
          bash infra/scripts/deploy-remote.sh
          EOF
