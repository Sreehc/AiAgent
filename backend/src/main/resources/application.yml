spring:
  application:
    name: aiagent-backend
  datasource:
    url: jdbc:postgresql://${APP_DB_HOST:localhost}:${APP_DB_PORT:5432}/${APP_DB_NAME:postgres}
    username: ${APP_DB_USERNAME:postgres}
    password: ${APP_DB_PASSWORD:root}
  data:
    redis:
      host: ${APP_REDIS_HOST:localhost}
      port: ${APP_REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${APP_KAFKA_CONSUMER_GROUP:aiagent-backend}
      auto-offset-reset: earliest
    producer:
      acks: all

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${APP_PORT:8080}

app:
  security:
    jwt-secret: ${APP_JWT_SECRET:change-me}
  auth:
    session-ttl-seconds: ${APP_SESSION_TTL_SECONDS:7200}
  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    knowledge-index-topic: ${APP_KAFKA_KNOWLEDGE_INDEX_TOPIC:aiagent.knowledge.index}
    consumer-group: ${APP_KAFKA_CONSUMER_GROUP:aiagent-backend}
  storage:
    endpoint: ${APP_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${APP_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${APP_MINIO_SECRET_KEY:minioadmin}
    bucket: ${APP_MINIO_BUCKET:aiagent}
  embedding:
    provider: ${APP_EMBEDDING_PROVIDER:local-mock}
    model-code: ${APP_EMBEDDING_MODEL_CODE:text-embedding-3-small}
    base-url: ${APP_EMBEDDING_BASE_URL:https://api.openai.com/v1}
    api-key: ${APP_EMBEDDING_API_KEY:}
    dimension: ${APP_EMBEDDING_DIMENSION:1536}
    connect-timeout-millis: ${APP_EMBEDDING_CONNECT_TIMEOUT_MILLIS:5000}
    read-timeout-millis: ${APP_EMBEDDING_READ_TIMEOUT_MILLIS:15000}
