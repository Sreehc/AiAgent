spring:
  application:
    name: aiagent-backend
  datasource:
    url: jdbc:postgresql://${APP_DB_HOST:localhost}:${APP_DB_PORT:5432}/${APP_DB_NAME:postgres}
    username: ${APP_DB_USERNAME:postgres}
    password: ${APP_DB_PASSWORD:postgres}
  data:
    redis:
      host: ${APP_REDIS_HOST:localhost}
      port: ${APP_REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${APP_KAFKA_CONSUMER_GROUP:aiagent-backend}
      auto-offset-reset: earliest
    producer:
      acks: all

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${APP_PORT:8080}

app:
  security:
    jwt-secret: ${APP_JWT_SECRET:change-me}
  auth:
    session-ttl-seconds: ${APP_SESSION_TTL_SECONDS:7200}
    login-failure-limit: ${APP_LOGIN_FAILURE_LIMIT:5}
    login-failure-window-seconds: ${APP_LOGIN_FAILURE_WINDOW_SECONDS:600}
  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    knowledge-index-topic: ${APP_KAFKA_KNOWLEDGE_INDEX_TOPIC:aiagent.knowledge.index}
    consumer-group: ${APP_KAFKA_CONSUMER_GROUP:aiagent-backend}
  storage:
    endpoint: ${APP_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${APP_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${APP_MINIO_SECRET_KEY:minioadmin}
    bucket: ${APP_MINIO_BUCKET:aiagent}
    presigned-url-ttl-seconds: ${APP_STORAGE_PRESIGNED_URL_TTL_SECONDS:900}
  embedding:
    provider: ${APP_EMBEDDING_PROVIDER:local-mock}
    model-code: ${APP_EMBEDDING_MODEL_CODE:text-embedding-3-small}
    base-url: ${APP_EMBEDDING_BASE_URL:https://api.openai.com/v1}
    api-key: ${APP_EMBEDDING_API_KEY:}
    dimension: ${APP_EMBEDDING_DIMENSION:1536}
    connect-timeout-millis: ${APP_EMBEDDING_CONNECT_TIMEOUT_MILLIS:5000}
    read-timeout-millis: ${APP_EMBEDDING_READ_TIMEOUT_MILLIS:15000}
    retry-max-attempts: ${APP_EMBEDDING_RETRY_MAX_ATTEMPTS:1}
    retry-backoff-millis: ${APP_EMBEDDING_RETRY_BACKOFF_MILLIS:250}
    observation-enabled: ${APP_EMBEDDING_OBSERVATION_ENABLED:false}
  rag:
    embedding-cache-ttl-seconds: ${APP_RAG_EMBEDDING_CACHE_TTL_SECONDS:3600}
    retrieval-cache-ttl-seconds: ${APP_RAG_RETRIEVAL_CACHE_TTL_SECONDS:300}
    retrieval-timeout-millis: ${APP_RAG_RETRIEVAL_TIMEOUT_MILLIS:1500}
  chat:
    provider: ${APP_CHAT_PROVIDER:local-mock}
    model-code: ${APP_CHAT_MODEL_CODE:claude-sonnet-4-6}
    base-url: ${APP_CHAT_BASE_URL:}
    api-key: ${APP_CHAT_API_KEY:}
    connect-timeout-millis: ${APP_CHAT_CONNECT_TIMEOUT_MILLIS:5000}
    read-timeout-millis: ${APP_CHAT_READ_TIMEOUT_MILLIS:15000}
    retry-max-attempts: ${APP_CHAT_RETRY_MAX_ATTEMPTS:1}
    retry-backoff-millis: ${APP_CHAT_RETRY_BACKOFF_MILLIS:250}
    observation-enabled: ${APP_CHAT_OBSERVATION_ENABLED:false}
  image:
    provider: ${APP_IMAGE_PROVIDER:local-mock}
    model-code: ${APP_IMAGE_MODEL_CODE:image-generation-default}
    base-url: ${APP_IMAGE_BASE_URL:}
    api-key: ${APP_IMAGE_API_KEY:}
    connect-timeout-millis: ${APP_IMAGE_CONNECT_TIMEOUT_MILLIS:5000}
    read-timeout-millis: ${APP_IMAGE_READ_TIMEOUT_MILLIS:15000}
    retry-max-attempts: ${APP_IMAGE_RETRY_MAX_ATTEMPTS:1}
    retry-backoff-millis: ${APP_IMAGE_RETRY_BACKOFF_MILLIS:250}
    observation-enabled: ${APP_IMAGE_OBSERVATION_ENABLED:false}
  mcp:
    allowed-hosts: ${APP_MCP_ALLOWED_HOSTS:localhost}
    allow-private-network: ${APP_MCP_ALLOW_PRIVATE_NETWORK:true}
    allowed-stdio-executables: ${APP_MCP_ALLOWED_STDIO_EXECUTABLES:}
  email:
    provider: ${APP_EMAIL_PROVIDER:log}
    from: ${APP_EMAIL_FROM:no-reply@aiagent.local}
    reset-base-url: ${APP_RESET_PASSWORD_BASE_URL:http://localhost:5173/reset-password}
    host: ${APP_SMTP_HOST:localhost}
    port: ${APP_SMTP_PORT:1025}
    username: ${APP_SMTP_USERNAME:}
    password: ${APP_SMTP_PASSWORD:}
    start-tls: ${APP_SMTP_STARTTLS:false}
    ssl: ${APP_SMTP_SSL:false}
    connect-timeout-millis: ${APP_SMTP_CONNECT_TIMEOUT_MILLIS:5000}
    read-timeout-millis: ${APP_SMTP_READ_TIMEOUT_MILLIS:10000}
  run:
    max-planning-rounds: ${APP_RUN_MAX_PLANNING_ROUNDS:3}
    max-plan-steps: ${APP_RUN_MAX_PLAN_STEPS:8}
    stale-timeout-minutes: ${APP_RUN_STALE_TIMEOUT_MINUTES:10}
  bootstrap:
    demo-data-enabled: ${APP_BOOTSTRAP_DEMO_DATA_ENABLED:true}
  secret:
    encryption-key: ${APP_SECRET_ENCRYPTION_KEY:}
